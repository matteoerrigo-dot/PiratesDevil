<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Pirates Devil</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>🏴‍☠️ Pirates Devil</h1>

  <!-- CAPTAIN -->
  <div id="captainPanel">
    🏴‍☠️ Capitaine :
    <strong id="captainName"></strong>
    <br>
    Bonus : <span id="captainBonus"></span>
  </div>

  <!-- GAME INFO -->
  <div id="gameInfo">
    <p>Tour : <span id="turn"></span></p>
    <p>Énergie : <span id="energy"></span></p>
    <button onclick="nextTurn()">Fin du tour</button>
  </div>

  <!-- BOARD -->
  <h2>⚔️ Équipage (Board)</h2>
  <div id="board" class="zone"></div>

  <!-- HAND -->
  <h2>🃏 Main</h2>
  <div id="hand" class="zone"></div>

  <script src="game.js"></script>

</body>
</html>
